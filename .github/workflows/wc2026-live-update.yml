name: WC 2026 Live Update

# Cron triggers fire ~90 min after each group-stage match's expected final
# whistle (kickoff + ~3h30m, covers normal time + stoppage + buffer). If a
# match's result isn't in football-data.org's feed yet, live_update.py just
# reports "no changes" and the run is a cheap no-op (no retrain, no LLM calls).
# All times are UTC (GitHub Actions cron is always UTC).
# Regenerate this list with the date-extraction snippet documented in
# docs/runbook.md if the fixture changes.
on:
  workflow_dispatch:
    inputs:
      debate_window_hours:
        description: "Horas hacia adelante para buscar partidos a debatir (default 36). Bajalo a 1-2 para probar con un solo partido."
        required: false
        default: "36"
  schedule:
    - cron: "30 22 11 6 *"
    - cron: "30 5 12 6 *"
    - cron: "30 22 12 6 *"
    - cron: "30 4 13 6 *"
    - cron: "30 22 13 6 *"
    - cron: "30 1 14 6 *"
    - cron: "30 4 14 6 *"
    - cron: "30 7 14 6 *"
    - cron: "30 20 14 6 *"
    - cron: "30 23 14 6 *"
    - cron: "30 2 15 6 *"
    - cron: "30 5 15 6 *"
    - cron: "30 19 15 6 *"
    - cron: "30 22 15 6 *"
    - cron: "30 1 16 6 *"
    - cron: "30 4 16 6 *"
    - cron: "30 22 16 6 *"
    - cron: "30 1 17 6 *"
    - cron: "30 4 17 6 *"
    - cron: "30 7 17 6 *"
    - cron: "30 20 17 6 *"
    - cron: "30 23 17 6 *"
    - cron: "30 2 18 6 *"
    - cron: "30 5 18 6 *"
    - cron: "30 19 18 6 *"
    - cron: "30 22 18 6 *"
    - cron: "30 1 19 6 *"
    - cron: "30 4 19 6 *"
    - cron: "30 22 19 6 *"
    - cron: "30 1 20 6 *"
    - cron: "0 4 20 6 *"
    - cron: "30 6 20 6 *"
    - cron: "30 20 20 6 *"
    - cron: "30 23 20 6 *"
    - cron: "30 3 21 6 *"
    - cron: "30 7 21 6 *"
    - cron: "30 19 21 6 *"
    - cron: "30 22 21 6 *"
    - cron: "30 1 22 6 *"
    - cron: "30 4 22 6 *"
    - cron: "30 20 22 6 *"
    - cron: "30 0 23 6 *"
    - cron: "30 3 23 6 *"
    - cron: "30 6 23 6 *"
    - cron: "30 20 23 6 *"
    - cron: "30 23 23 6 *"
    # J3 (Matchday 3) — 3 daily runs to update third-place probabilities only (no narrations)
    # Jun 24 (Groups A,B,C)
    - cron: "0 18 24 6 *"
    - cron: "30 0 25 6 *"
    - cron: "0 3 25 6 *"
    # Jun 25 (Groups D,E,F)
    - cron: "0 20 25 6 *"
    - cron: "0 2 26 6 *"
    - cron: "0 4 26 6 *"
    # Jun 26 (Groups G,H,I)
    - cron: "0 19 26 6 *"
    - cron: "0 4 27 6 *"
    - cron: "0 5 27 6 *"
    # Jun 27 (Groups J,K,L)
    - cron: "0 2 27 6 *"
    - cron: "30 4 27 6 *"
    - cron: "0 6 28 6 *"
    - cron: "30 0 28 6 *"
    - cron: "0 3 28 6 *"
    - cron: "30 5 28 6 *"

permissions:
  contents: write

concurrency:
  group: wc2026-live-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Determine if this run is during J3 (Jun 24-27) → update terceros only
      - name: Detect J3 (Matchday 3) — group stage simultaneous matches
        id: is_j3
        run: |
          DAY=$(date -u +%d)
          MONTH=$(date -u +%m)
          if [ "$MONTH" = "06" ] && [ "$DAY" -ge "24" ] && [ "$DAY" -le "27" ]; then
            echo "is_j3=true" >> "$GITHUB_OUTPUT"
            echo "J3 detected (Jun $DAY): updating terceros only (no narrations/debate)"
          else
            echo "is_j3=false" >> "$GITHUB_OUTPUT"
            echo "Not J3: running full cycle (live_update → predict → narrations → debate)"
          fi

      # ============ J3 PATH: Update terceros (Monte Carlo) only ============
      - name: "[J3] Update third-place probabilities (Monte Carlo, ~5s)"
        if: steps.is_j3.outputs.is_j3 == 'true'
        run: python scripts/update_third_place_probs.py

      # ============ NORMAL PATH: Full cycle (pre-J3 and post-J3) ============
      - name: "[Full Cycle] Live update (fetch results, retrain if needed)"
        if: steps.is_j3.outputs.is_j3 == 'false'
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/live_update.py --force

      - name: "[Full Cycle] Live predictions export (anti-leakage ELO cutoff)"
        if: steps.is_j3.outputs.is_j3 == 'false'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/predict_live.py --export

      - name: "[Full Cycle] Precompute narrations + group previews"
        if: steps.is_j3.outputs.is_j3 == 'false'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/precompute_narrations.py

      - name: "[Full Cycle] Determine upcoming matches for Agent Debate"
        if: steps.is_j3.outputs.is_j3 == 'false'
        id: debate_targets
        env:
          DEBATE_WINDOW_HOURS: ${{ github.event.inputs.debate_window_hours || '36' }}
        run: |
          PAIRS=$(python scripts/ci_debate_targets.py)
          echo "pairs=$PAIRS" >> "$GITHUB_OUTPUT"

      - name: "[Full Cycle] Run Agent Debate for upcoming matches"
        if: steps.is_j3.outputs.is_j3 == 'false' && steps.debate_targets.outputs.pairs != ''
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_agent_debate.py ${{ steps.debate_targets.outputs.pairs }}

      - name: "[Full Cycle] Export frontend data (publish Agent Debate results)"
        if: steps.is_j3.outputs.is_j3 == 'false' && steps.debate_targets.outputs.pairs != ''
        run: python scripts/export_frontend_data.py

      - name: Commit and push generated data
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ frontend/public/data/ models/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit (no new results yet)."
          else
            git commit -m "data: automated live update ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi

      - name: Set up Node
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy frontend to Vercel
        if: success()
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --yes
